@if (artistData && (artistColorMap | keyvalue).length) {
  <div class="max-w-7xl mx-auto px-4 md:px-8 pb-20 pt-8">
    <div class="mb-10">
      <h1 class="text-xl md:text-3xl font-semibold text-neutral-100 tracking-tight mb-3">
        {{ categoryName }}
      </h1>

      <div class="flex items-center gap-3 text-sm text-neutral-400">
        <div class="px-2 py-0.5 text-xs uppercase tracking-widest text-neutral-300">Genre</div>

        <div class="flex items-center gap-1.5">
          <span class="w-1 h-1 rounded-full bg-neutral-600"></span>
          <span>Top Artists Timeline</span>
        </div>
      </div>
    </div>

    <div class="mb-16 w-full h-[600px]">
      <app-stacked-chart [data]="artistData" [colors]="artistColorMap" routeType="artist" [height]="400">
      </app-stacked-chart>
    </div>

    <div class="w-full">
      <div class="flex items-end justify-between mb-6">
        <h2 class="text-lg font-semibold text-neutral-200 leading-none">Top Artists</h2>

        <div class="flex items-center gap-4 text-xs font-medium text-neutral-500 uppercase tracking-wider">
          <button class="transition-colors hover:text-neutral-300 text-neutral-100">Listens</button>
        </div>
      </div>

      <div class="flex flex-col gap-1"></div>
    </div>
  </div>
} @else {
  <div class="flex items-center justify-center min-h-[50vh]">
    <div class="flex items-center text-neutral-500 font-mono text-xs md:text-sm">
      <span>loading</span>
      <span class="inline-block w-2 h-3 ml-2 bg-neutral-500 animate-pulse"></span>
    </div>
  </div>
}
